<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pase de Salida - Seleccionar Empresa</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #EEEEEE;
    color: #111;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .wrap { max-width: 720px; width: 100%; }
  .depto-logo {
    display: block;
    margin: 0 auto 18px;
    max-width: 220px;
    width: 100%;
    height: auto;
  }
  h1 {
    text-align: center;
    font-size: 18px;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  p.sub {
    text-align: center;
    color: #666;
    font-size: 13px;
    margin-bottom: 32px;
  }
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 20px;
  }
  .card {
    background: #FFFFFF;
    border: 1.5px solid #BBBBBB;
    border-radius: 10px;
    padding: 28px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-decoration: none;
    color: #111;
    transition: transform 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    min-height: 160px;
  }
  .card:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 16px rgba(0,0,0,0.12);
    border-color: #888;
  }
  .card img {
    max-width: 170px;
    max-height: 90px;
    object-fit: contain;
  }
  footer {
    text-align: center;
    margin-top: 32px;
    font-size: 11px;
    color: #AAAAAA;
  }
  .historico-link {
    display: block;
    text-align: center;
    margin-top: 28px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.4px;
    text-transform: uppercase;
    color: #555;
    text-decoration: none;
    border: 1.5px solid #BBBBBB;
    border-radius: 8px;
    padding: 10px 16px;
    background: #FFFFFF;
    transition: border-color 0.15s ease, color 0.15s ease;
  }
  .historico-link:hover { border-color: #888; color: #111; }
</style>
</head>
